<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Master DSA — Practice</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ══ LAYOUT ══ */
.practice-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: calc(100vh - 60px);
  overflow: hidden;
}
@media(max-width:768px) {
  .practice-layout { grid-template-columns: 1fr; }
  .practice-sidebar { display: none; }
}

/* ══ SIDEBAR ══ */
.practice-sidebar {
  background: #09091a;
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-search {
  padding: 1rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sidebar-search input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; padding: 0.55rem 0.85rem;
  color: #fff; font-size: 0.82rem; font-family: 'DM Sans', sans-serif;
  outline: none; box-sizing: border-box;
}
.sidebar-search input::placeholder { color: rgba(255,255,255,0.28); }
.sidebar-search input:focus { border-color: rgba(124,106,247,0.4); }

.topic-tabs { overflow-y: auto; flex: 1; padding: 0.5rem 0; }
.topic-tab {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.65rem 1rem; cursor: pointer; transition: all 0.15s;
  border-left: 2px solid transparent;
}
.topic-tab:hover { background: rgba(255,255,255,0.04); }
.topic-tab.active {
  background: rgba(124,106,247,0.08);
  border-left-color: #a89df7;
}
.topic-tab-left { display: flex; align-items: center; gap: 0.65rem; }
.topic-tab-icon { font-size: 0.95rem; width: 18px; text-align: center; }
.topic-tab-name { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
.topic-tab.active .topic-tab-name { color: #a89df7; font-weight: 600; }
.topic-tab-count {
  font-size: 0.65rem; padding: 2px 6px; border-radius: 99px;
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3);
}
.topic-tab.active .topic-tab-count {
  background: rgba(124,106,247,0.15); color: #a89df7;
}
.topic-tab-done {
  font-size: 0.6rem; color: #34d399;
  margin-right: 0.25rem;
}

/* ══ MAIN ══ */
.practice-main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
}
@media(max-width:1000px) {
  .practice-main { grid-template-columns: 1fr; }
  .editor-panel { display: none; }
}

/* ══ QUESTION PANEL ══ */
.q-panel {
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.q-panel-hdr {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: #09091a;
}
.q-list { overflow-y: auto; flex: 1; }
.q-row {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; transition: background 0.12s;
}
.q-row:hover { background: rgba(255,255,255,0.04); }
.q-row.active { background: rgba(124,106,247,0.08); }
.q-diff {
  font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 99px;
  flex-shrink: 0; white-space: nowrap;
}
.diff-Easy   { background: rgba(52,211,153,0.12); color: #34d399; }
.diff-Medium { background: rgba(251,191,36,0.12);  color: #fbbf24; }
.diff-Hard   { background: rgba(248,113,113,0.12); color: #f87171; }
.q-row-title { font-size: 0.88rem; color: rgba(255,255,255,0.8); flex: 1; }
.q-row-companies { font-size: 0.65rem; color: rgba(255,255,255,0.28); }
.q-solved-tick { color: #34d399; font-size: 0.75rem; flex-shrink: 0; }

/* ══ Q DETAIL (inside q-panel when q selected) ══ */
.q-detail { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.q-detail-hdr {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  background: #09091a;
  display: flex; align-items: center; justify-content: space-between;
}
.q-detail-body { overflow-y: auto; padding: 1.25rem; flex: 1; }
.tab-row { display: flex; gap: 0.35rem; margin-bottom: 1rem; }
.qtab {
  font-size: 0.72rem; font-weight: 600; padding: 5px 12px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08); background: transparent;
  color: rgba(255,255,255,0.38); cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.qtab.on { background: rgba(124,106,247,0.15); border-color: rgba(124,106,247,0.4); color: #a89df7; }
.hint-box {
  background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.15);
  border-radius: 10px; padding: 0.9rem 1rem;
  font-size: 0.82rem; color: rgba(251,191,36,0.85); line-height: 1.6;
}
.solution-box {
  background: rgba(52,211,153,0.04); border: 1px solid rgba(52,211,153,0.12);
  border-radius: 10px; padding: 0.9rem 1rem;
  font-size: 0.82rem; color: rgba(255,255,255,0.7); line-height: 1.6;
}
.similar-q-tag {
  display: inline-block; font-size: 0.72rem; padding: 3px 10px;
  border-radius: 99px; background: rgba(124,106,247,0.1);
  color: #a89df7; border: 1px solid rgba(124,106,247,0.2);
  cursor: pointer; margin: 0.2rem;
}
.similar-q-tag:hover { background: rgba(124,106,247,0.2); }

/* ══ EDITOR PANEL ══ */
.editor-panel {
  display: flex; flex-direction: column; overflow: hidden;
  background: #07071a;
}
.editor-hdr {
  padding: 0.75rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: space-between;
  background: #09091a;
}
.lang-tabs { display: flex; gap: 0.3rem; }
.lang-tab {
  font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 7px;
  border: 1px solid rgba(255,255,255,0.08); background: transparent;
  color: rgba(255,255,255,0.38); cursor: pointer; transition: all 0.12s;
  font-family: 'DM Sans', sans-serif;
}
.lang-tab.on { border-color: rgba(124,106,247,0.4); color: #a89df7; background: rgba(124,106,247,0.1); }
.editor-area {
  flex: 1; position: relative; overflow: hidden;
}
#code-editor {
  width: 100%; height: 100%;
  background: transparent; border: none; outline: none;
  color: #e2e8f0; font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 0.82rem; line-height: 1.7; padding: 1.25rem;
  resize: none; box-sizing: border-box;
  tab-size: 2;
}
.editor-footer {
  padding: 0.75rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 0.75rem;
  background: #09091a;
}
.run-btn {
  background: rgba(52,211,153,0.12); color: #34d399;
  border: 1px solid rgba(52,211,153,0.25); border-radius: 8px;
  padding: 0.5rem 1.25rem; font-size: 0.82rem; font-weight: 700;
  font-family: 'Syne', sans-serif; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.run-btn:hover { background: rgba(52,211,153,0.2); }
.run-btn.running { opacity: 0.6; cursor: not-allowed; }
.output-panel {
  height: 140px; background: #030310;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 0.75rem 1.25rem; overflow-y: auto;
  font-family: 'Fira Code', monospace; font-size: 0.78rem;
  color: rgba(255,255,255,0.6); line-height: 1.6;
}
.output-panel .out-success { color: #34d399; }
.output-panel .out-error   { color: #f87171; }
.output-panel .out-info    { color: rgba(255,255,255,0.3); }

/* ══ TOPIC HEADER ══ */
.topic-header-card {
  padding: 1rem 1.25rem;
  background: linear-gradient(135deg, rgba(124,106,247,0.06), rgba(6,182,212,0.03));
  border-bottom: 1px solid rgba(124,106,247,0.12);
}
.topic-header-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; color:#fff; margin-bottom:0.2rem; }
.topic-header-meta  { font-size:0.75rem; color:rgba(255,255,255,0.38); }
.topic-trick-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.72rem; color: #fbbf24; margin-top: 0.5rem;
  background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.15);
  padding: 3px 10px; border-radius: 99px;
}

/* ══ NAVBAR ══ */
.profile-wrap { position: relative; }
.profile-btn { display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 12px 4px 4px;cursor:pointer; }
.profile-dropdown { position:absolute;top:calc(100% + 8px);right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:200px;box-shadow:0 20px 40px rgba(0,0,0,0.4);display:none;z-index:500; }
.profile-dropdown.open { display:block; }
.dropdown-header { padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--border); }
.dropdown-header .d-name { font-size:0.9rem;font-weight:600;color:var(--text); }
.dropdown-menu { padding:0.5rem; }
.dropdown-item { display:flex;align-items:center;gap:10px;padding:0.6rem 0.75rem;border-radius:8px;font-size:0.875rem;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;text-decoration:none; }
.dropdown-item:hover { background:var(--surface2);color:var(--text); }
.dropdown-item.danger:hover { background:rgba(248,113,113,0.1);color:var(--red); }
.dropdown-divider { height:1px;background:var(--border);margin:0.3rem 0.5rem; }
</style>
</head>
<body>
<div id="toast"></div>

<!-- NAVBAR -->
<nav class="navbar" style="position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.06);">
  <div class="nav-logo">
    <a href="masterdsa-dashboard.html" style="display:flex;align-items:center;gap:8px;color:inherit">
      <span class="dot"></span> Master DSA
    </a>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <a href="masterdsa-dashboard.html" style="font-size:0.82rem;color:rgba(255,255,255,0.45);text-decoration:none;padding:0.35rem 0.75rem;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='none'">🏠 Home</a>
    <a href="masterdsa-roadmap.html"   style="font-size:0.82rem;color:rgba(255,255,255,0.45);text-decoration:none;padding:0.35rem 0.75rem;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='none'">🗺️ Roadmap</a>
    <a href="masterdsa-practice.html"  style="font-size:0.82rem;color:#a89df7;text-decoration:none;padding:0.35rem 0.75rem;border-radius:8px;background:rgba(124,106,247,0.1);">📚 Practice</a>

          <div class="d-name" id="dd-name">—</div>

        </div>

</nav>

<!-- MAIN LAYOUT -->
<div class="practice-layout">

  <!-- SIDEBAR -->
  <div class="practice-sidebar">
    <div class="sidebar-search">
      <input type="text" id="q-search" placeholder="🔍 Search questions..." oninput="searchQ()">
    </div>
    <div class="topic-tabs" id="topic-tabs">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- MAIN: Q list + Editor -->
  <div class="practice-main" id="practice-main">

    <!-- Question Panel -->
    <div class="q-panel" id="q-panel">

      <!-- Q List view -->
      <div id="q-list-view" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div class="topic-header-card" id="topic-hdr">
          <div class="topic-header-title" id="topic-hdr-title">Select a topic</div>
          <div class="topic-header-meta"  id="topic-hdr-meta">Click any topic from the left</div>
        </div>
        <div class="q-list" id="q-list">
          <div style="padding:2rem;text-align:center;color:rgba(255,255,255,0.25);font-size:0.85rem;">
            ← Select a topic to see questions
          </div>
        </div>
      </div>

      <!-- Q Detail view -->
      <div id="q-detail-view" class="q-detail" style="display:none;">
        <div class="q-detail-hdr">
          <div style="display:flex;align-items:center;gap:0.65rem;flex-wrap:wrap">
            <button onclick="backToList()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px 10px;font-size:0.75rem;color:rgba(255,255,255,0.5);cursor:pointer;">← Back</button>
            <span id="q-detail-diff" class="q-diff diff-Medium">Medium</span>
            <span id="q-detail-title" style="font-size:0.95rem;font-weight:700;color:#fff"></span>
          </div>
          <div id="q-detail-companies" style="font-size:0.68rem;color:rgba(255,255,255,0.3)"></div>
        </div>
        <div class="q-detail-body" id="q-detail-body">
          <!-- Rendered by JS -->
        </div>
      </div>

    </div>

    <!-- Editor Panel -->
    <div class="editor-panel" id="editor-panel">
      <div class="editor-hdr">
        <div class="lang-tabs">
          <button class="lang-tab on" onclick="setLang('java',this)">Java</button>
          <button class="lang-tab" onclick="setLang('python',this)">Python</button>
          <button class="lang-tab" onclick="setLang('cpp',this)">C++</button>
          <button class="lang-tab" onclick="setLang('c',this)">C</button>
        </div>
        <span style="font-size:0.65rem;color:rgba(255,255,255,0.2)">Piston API · Free compiler</span>

      <div class="editor-area">
        <textarea id="code-editor" spellcheck="false" placeholder="// Select a question to start coding..."></textarea>
      </div>
      <div class="editor-footer">
        <button class="run-btn" id="run-btn" onclick="runCode()">▶ Run Code</button>
        <button onclick="resetCode()" style="background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:0.5rem 1rem;font-size:0.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;">Reset</button>
        <span id="run-status" style="font-size:0.72rem;color:rgba(255,255,255,0.3);margin-left:auto"></span>
      </div>
      <div class="output-panel" id="output-panel">
        <span class="out-info">// Output will appear here after running code</span>
      </div>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const cachedUser = Auth.requireAuth();
if (!cachedUser) throw new Error();

Auth.setNavUser(cachedUser.name || cachedUser.email);
document.getElementById('nav-name').textContent = cachedUser.name || '';
document.getElementById('dd-name').textContent  = cachedUser.name || '';
document.getElementById('nav-avatar').textContent = (cachedUser.name||'U').charAt(0).toUpperCase();

// ── STATE ──
let allTopics   = [];
let currentTopic = null;
let currentQ     = null;
let currentLang  = 'java';
let activeTab    = 'hint';

const TOPIC_DATA = [
  { slug:'arrays',      name:'Arrays & Strings',    icon:'📐', count:40 },
  { slug:'linkedlist',  name:'Linked List',          icon:'🔗', count:22 },
  { slug:'stacks',      name:'Stacks & Queues',      icon:'📚', count:20 },
  { slug:'recursion',   name:'Recursion',            icon:'🔄', count:24 },
  { slug:'trees',       name:'Trees & BST',          icon:'🌳', count:28 },
  { slug:'sorting',     name:'Searching & Sorting',  icon:'🔍', count:20 },
  { slug:'binarysearch',name:'Binary Search',        icon:'🎯', count:18 },
  { slug:'heaps',       name:'Heaps',                icon:'⛰️',  count:16 },
  { slug:'graphs',      name:'Graphs',               icon:'🕸️',  count:24 },
  { slug:'greedy',      name:'Greedy',               icon:'💰', count:16 },
  { slug:'dp',          name:'Dynamic Programming',  icon:'🧩', count:36 },
  { slug:'tries',       name:'Tries & Adv Trees',    icon:'🌲', count:14 },
  { slug:'bits',        name:'Bit Manipulation',     icon:'⚙️',  count:16 },
  { slug:'math',        name:'Math & Number Theory', icon:'🔢', count:14 },
];

const LANG_STARTERS = {
  java:   `import java.util.*;\n\nclass Solution {\n  public void solve() {\n    // Write your solution here\n    \n  }\n}`,
  python: `def solve():\n    # Write your solution here\n    pass\n\nsolve()`,
  cpp:    `#include <bits/stdc++.h>\nusing namespace std;\n\nint main() {\n    // Write your solution here\n    \n    return 0;\n}`,
  c:      `#include <stdio.h>\n\nint main() {\n    // Write your solution here\n    \n    return 0;\n}`,
};

const LANG_IDS = { java:'java', python:'python', cpp:'cpp', c:'c' };

// ── INIT ──
(async function init() {
  // Fresh auth check
  try {
    const fresh = await API.call('/auth/me');
    if (fresh?.user) {
      if (!fresh.user.masterDsaAccess) {
        window.location.href = 'masterdsa.html';
        return;
      }
      if (fresh.token) localStorage.setItem('pp_token', fresh.token);
      localStorage.setItem('pp_user', JSON.stringify(fresh.user));
      document.getElementById('nav-streak').textContent = 0;
    }
  } catch(e) {}

  renderTopicTabs();
  // Load first topic by default
  selectTopic(TOPIC_DATA[0]);
})();

// ── TOPIC TABS ──
function renderTopicTabs() {
  document.getElementById('topic-tabs').innerHTML = TOPIC_DATA.map(t => `
    <div class="topic-tab" id="tab-${t.slug}" onclick="selectTopic(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="topic-tab-left">
        <span class="topic-tab-icon">${t.icon}</span>
        <span class="topic-tab-name">${t.name}</span>
      </div>
      <span class="topic-tab-count">${t.count}</span>
    </div>`).join('');
}

function selectTopic(t) {
  currentTopic = t;
  // Update active tab
  document.querySelectorAll('.topic-tab').forEach(el => el.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + t.slug);
  if (tabEl) tabEl.classList.add('active');

  // Update header
  document.getElementById('topic-hdr-title').textContent = t.icon + ' ' + t.name;
  document.getElementById('topic-hdr-meta').textContent  = t.count + ' questions';

  // Show list view
  showListView();
  loadQuestions(t.slug);
}

async function loadQuestions(slug) {
  document.getElementById('q-list').innerHTML = `
    <div style="padding:2rem;text-align:center;color:rgba(255,255,255,0.3);font-size:0.82rem">Loading...</div>`;
  try {
    const qs = await API.call('/masterdsa/questions/' + slug);
    renderQList(qs);
  } catch(e) {
    // Fallback demo questions if API not ready
    renderQList(getDemoQuestions(slug));
  }
}

function getDemoQuestions(slug) {
  const demos = {
    arrays: [
      { _id:'1', title:'Two Sum', difficulty:'Easy',   companies:['TCS','Amazon'] },
      { _id:'2', title:'Maximum Subarray', difficulty:'Medium', companies:['Infosys','TCS'] },
      { _id:'3', title:'Best Time to Buy and Sell Stock', difficulty:'Easy', companies:['Amazon'] },
      { _id:'4', title:'Trapping Rain Water', difficulty:'Hard', companies:['Amazon','Google'] },
      { _id:'5', title:'Product of Array Except Self', difficulty:'Medium', companies:['Amazon','Flipkart'] },
      { _id:'6', title:'Container With Most Water', difficulty:'Medium', companies:['Amazon'] },
      { _id:'7', title:'3Sum', difficulty:'Medium', companies:['Amazon','TCS'] },
      { _id:'8', title:'Sliding Window Maximum', difficulty:'Hard', companies:['Google','Amazon'] },
    ],
    linkedlist: [
      { _id:'9',  title:'Reverse Linked List', difficulty:'Easy',   companies:['TCS','Infosys'] },
      { _id:'10', title:'Detect Cycle', difficulty:'Easy',   companies:['Amazon','TCS'] },
      { _id:'11', title:'Merge Two Sorted Lists', difficulty:'Easy',   companies:['Amazon'] },
      { _id:'12', title:'LRU Cache', difficulty:'Hard',   companies:['Amazon','Flipkart'] },
    ]
  };
  return demos[slug] || [
    { _id:'x1', title:'Sample Question 1', difficulty:'Easy',   companies:['TCS'] },
    { _id:'x2', title:'Sample Question 2', difficulty:'Medium', companies:['Amazon'] },
    { _id:'x3', title:'Sample Question 3', difficulty:'Hard',   companies:['Google'] },
  ];
}

function renderQList(qs) {
  if (!qs.length) {
    document.getElementById('q-list').innerHTML =
      '<div style="padding:2rem;text-align:center;color:rgba(255,255,255,0.3);font-size:0.82rem">No questions yet — coming soon!</div>';
    return;
  }
  document.getElementById('q-list').innerHTML = qs.map((q,i) => `
    <div class="q-row" id="qrow-${q._id}" onclick="openQuestion('${q._id}', ${JSON.stringify(q).replace(/"/g,'&quot;')})">
      <span style="font-size:0.65rem;color:rgba(255,255,255,0.2);width:18px;flex-shrink:0">${i+1}</span>
      <span class="q-diff diff-${q.difficulty}">${q.difficulty}</span>
      <span class="q-row-title">${q.title}</span>
      <span class="q-row-companies">${(q.companies||[]).slice(0,2).join(', ')}</span>
    </div>`).join('');
}

// ── OPEN QUESTION ──
async function openQuestion(id, qData) {
  currentQ = qData;
  // Set editor starter code
  document.getElementById('code-editor').value = LANG_STARTERS[currentLang];

  // Show detail view
  showDetailView();

  document.getElementById('q-detail-title').textContent    = qData.title;
  document.getElementById('q-detail-diff').textContent     = qData.difficulty;
  document.getElementById('q-detail-diff').className       = `q-diff diff-${qData.difficulty}`;
  document.getElementById('q-detail-companies').textContent = (qData.companies||[]).join(' · ');

  // Try API, fallback to demo
  let fullQ = qData;
  try {
    fullQ = await API.call('/masterdsa/question/' + id);
  } catch(e) {}

  renderQDetail(fullQ);
}

function renderQDetail(q) {
  document.getElementById('q-detail-body').innerHTML = `
    <div style="font-size:0.9rem;color:rgba(255,255,255,0.75);line-height:1.75;margin-bottom:1.25rem">
      ${q.description || 'Solve this problem using optimal approach.'}
    </div>

    ${q.examples?.length ? q.examples.map(ex => `
      <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:0.85rem 1rem;margin-bottom:0.75rem;font-size:0.8rem">
        <div style="color:rgba(255,255,255,0.3);margin-bottom:4px">Example</div>
        <div><span style="color:rgba(255,255,255,0.4)">Input:</span> <span style="color:#e2e8f0">${ex.input}</span></div>
        <div><span style="color:#34d399">Output:</span> <span style="color:#e2e8f0">${ex.output}</span></div>
        ${ex.explanation ? `<div style="color:rgba(255,255,255,0.4);margin-top:4px">${ex.explanation}</div>` : ''}
      </div>`).join('') : `
      <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:0.85rem 1rem;margin-bottom:0.75rem;font-size:0.8rem">
        <div style="color:rgba(255,255,255,0.4)">Input:</div>
        <div style="color:#e2e8f0">nums = [2,7,11,15], target = 9</div>
        <div style="color:#34d399">Output: [0, 1]</div>
      </div>`}

    ${q.timeComplex ? `
      <div style="display:flex;gap:0.5rem;margin-bottom:1.25rem;flex-wrap:wrap">
        <span style="font-size:0.7rem;padding:3px 9px;border-radius:99px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4)">⏱ Time: ${q.timeComplex}</span>
        <span style="font-size:0.7rem;padding:3px 9px;border-radius:99px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4)">💾 Space: ${q.spaceComplex||'O(n)'}</span>
      </div>` : ''}

    <div class="tab-row">
      <button class="qtab on" onclick="showTab('hint',this)">💡 Hint</button>
      <button class="qtab"    onclick="showTab('approach',this)">🧠 Approach</button>
      <button class="qtab"    onclick="showTab('solution',this)">📖 Solution</button>
    </div>

    <div id="tab-hint">
      <div class="hint-box">${q.hint || '💡 Try using a HashMap to store visited elements. For each element, check if the complement exists.'}</div>
    </div>
    <div id="tab-approach" style="display:none">
      <div class="solution-box">${q.approach || 'Use optimal data structure to reduce time complexity from O(n²) to O(n).'}</div>
    </div>
    <div id="tab-solution" style="display:none">
      <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:0.9rem;font-family:monospace;font-size:0.78rem;color:#e2e8f0;line-height:1.7;white-space:pre-wrap">${q.java_code || '// Solution available after attempting the problem'}</div>
    </div>

    ${q.similarQs?.length ? `
      <div style="margin-top:1.25rem">
        <div style="font-size:0.72rem;color:rgba(255,255,255,0.3);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.06em">Similar questions</div>
        ${q.similarQs.map(sq => `<span class="similar-q-tag">${sq}</span>`).join('')}
      </div>` : `
      <div style="margin-top:1.25rem">
        <div style="font-size:0.72rem;color:rgba(255,255,255,0.3);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.06em">Similar questions</div>
        <span class="similar-q-tag">Three Sum</span>
        <span class="similar-q-tag">Two Sum II</span>
        <span class="similar-q-tag">4Sum</span>
      </div>`}
  `;
}

function showTab(tab, btn) {
  ['hint','approach','solution'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.qtab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

// ── VIEWS ──
function showListView() {
  document.getElementById('q-list-view').style.display   = 'flex';
  document.getElementById('q-detail-view').style.display = 'none';
}
function showDetailView() {
  document.getElementById('q-list-view').style.display   = 'none';
  document.getElementById('q-detail-view').style.display = 'flex';
}
function backToList() { showListView(); }

// ── LANG ──
function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if (currentQ) {
    document.getElementById('code-editor').value = LANG_STARTERS[lang];
  }
}

// ── RESET ──
function resetCode() {
  document.getElementById('code-editor').value = LANG_STARTERS[currentLang];
  document.getElementById('output-panel').innerHTML = '<span class="out-info">// Code reset</span>';
}

// ── RUN CODE (Piston API) ──
async function runCode() {
  const btn  = document.getElementById('run-btn');
  const code = document.getElementById('code-editor').value.trim();
  const out  = document.getElementById('output-panel');

  if (!code) { out.innerHTML = '<span class="out-error">// Nothing to run</span>'; return; }

  btn.classList.add('running');
  btn.textContent = '⏳ Running...';
  document.getElementById('run-status').textContent = 'Executing...';
  out.innerHTML = '<span class="out-info">// Running your code...</span>';

  const langMap = {
    java:   { language:'java',   version:'*' },
    python: { language:'python', version:'3' },
    cpp:    { language:'c++',    version:'*' },
    c:      { language:'c',      version:'*' },
  };
  const { language, version } = langMap[currentLang];

 try {
  const res = await fetch('https://api.codex.jaagrav.in', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      language: 'java',
      code: code,
      input: '' // Agar user input dena ho toh
    })
  });

  const data = await res.json();
  
  if (data.error) {
    console.error("Error:", data.error); // Kuch galti hui toh yahan dikhega
  } else {
    console.log("Output:", data.output); // Ye aapka code ka output hai
  }
} catch (error) {
  console.error("Network Error:", error);
}
    const data = await res.json();
    const stdout = data.run?.stdout || '';
    const stderr = data.run?.stderr || '';
    const exitCode = data.run?.code;

    if (stderr && !stdout) {
      out.innerHTML = `<span class="out-error">${escHtml(stderr)}</span>`;
    } else if (stdout) {
      out.innerHTML = `<span class="out-success">${escHtml(stdout)}</span>`;
      if (stderr) out.innerHTML += `\n<span class="out-error">${escHtml(stderr)}</span>`;
    } else {
      out.innerHTML = `<span class="out-info">// No output (exit code: ${exitCode})</span>`;
    }
    document.getElementById('run-status').textContent = exitCode === 0 ? '✓ Done' : '✗ Error';
  } catch(e) {
    out.innerHTML = `<span class="out-error">// Compiler unavailable. Check your internet connection.</span>`;
    document.getElementById('run-status').textContent = '✗ Failed';
  } finally {
    btn.classList.remove('running');
    btn.innerHTML = '▶ Run Code';
  }
}

// ── SEARCH ──
function searchQ() {
  const q = document.getElementById('q-search').value.toLowerCase();
  document.querySelectorAll('.topic-tab').forEach(tab => {
    const name = tab.querySelector('.topic-tab-name').textContent.toLowerCase();
    tab.style.display = name.includes(q) ? 'flex' : 'none';
  });
}

// ── UTIL ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggleDD() { document.getElementById('dd').classList.toggle('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('.profile-wrap')) document.getElementById('dd').classList.remove('open');
});

// Tab key in editor
document.getElementById('code-editor').addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0,s) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = s + 2;
  }
});
</script>
