<!-- ═══ MOCK TESTS COMPACT BADGE ═══ -->

  display:flex; align-items:center; gap:0.6rem;
  background:linear-gradient(135deg,rgba(124,106,247,0.12),rgba(6,182,212,0.06));
  border:1px solid rgba(124,106,247,0.3); border-radius:12px;

  position:relative; overflow:hidden;
" onmouseover="this.style.borderColor='rgba(124,106,247,0.6)';this.style.transform='translateY(-1px)'"
   onmouseout="this.style.borderColor='rgba(124,106,247,0.3)';this.style.transform='translateY(0)'">
  <span style="font-size:1.1rem;animation:mtb 3s ease-in-out infinite">🎯</span>
  <div>
    <div style="font-size:0.72rem;font-weight:700;color:#a89df7;font-family:'Syne',sans-serif;">Mock Tests</div>
    <div style="font-size:0.62rem;color:rgba(255,255,255,0.35);">50 tests · ₹199</div>
  </div>
  <div style="
    font-size:0.6rem;font-weight:700;color:#0a0a14;
    background:#a89df7;padding:2px 6px;border-radius:99px;
    position:absolute;top:6px;right:6px;
  ">NEW</div>

  <div class="filter-bar">

    <select id="type-filter" onchange="filterCards()">

      <option value="Product">Product</option>

      <option value="">All test types</option>

  <div class="companies-grid" id="companies-grid">
    <!-- skeleton -->
    <div class="card skeleton" style="height:200px"></div>
    <div class="card skeleton" style="height:200px"></div>
    <div class="card skeleton" style="height:200px"></div>
    <div class="card skeleton" style="height:200px"></div>
    <div class="card skeleton" style="height:200px"></div>
    <div class="card skeleton" style="height:200px"></div>
  </div>

<!-- COMPANY DETAIL MODAL -->
<div id="company-modal" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="company-modal-header" id="modal-header-content"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body-content"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  Auth.requirePaid();
  const u = Auth.decodeToken();
  if (u) Auth.setNavUser(u.name || u.email);

  let allCompanies = [];

  const logoUrl = (domain) => domain
    ? `https://logo.clearbit.com/${domain}`
    : null;

  const logoHtml = (company) => {
    const url = logoUrl(company.domain);
    if (url) {
      return `<div class="company-logo">
        <img src="${url}" alt="${company.name}" onerror="this.parentElement.outerHTML='<div class=\\'company-logo-fallback\\'>${company.name.charAt(0)}</div>'">
      </div>`;
    }
    return `<div class="company-logo-fallback">${company.name.charAt(0)}</div>`;
  };

  const badgeType = (t) => {
    const map = { Product:'product', Service:'service', Startup:'startup' };
    return `<span class="badge badge-${map[t]||'product'}">${t||'Company'}</span>`;
  };

  const renderCard = (c) => `
    <div class="company-card" onclick="openModal('${c._id}')">
      <div class="company-card-header">
        ${logoHtml(c)}
        <div class="company-card-info">
          <h3>${c.name}</h3>
          <div class="company-card-meta">
            ${badgeType(c.type)}
            ${c.year ? `<span style="font-size:0.75rem;color:var(--faint)">${c.year}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="company-card-body">
        <div class="company-stat-row">
          <div class="company-stat">
            <span class="label">Test</span>
            <span class="value">${c.testType || '—'}</span>
          </div>
          <div class="company-stat">
            <span class="label">Package</span>
            <span class="value">${c.package || '—'}</span>
          </div>
          ${c.eligibility ? `<div class="company-stat"><span class="label">Eligibility</span><span class="value">${c.eligibility}</span></div>` : ''}
        </div>
        <div class="company-card-footer">
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${(c.dsaTopics||[]).slice(0,3).map(t=>`<span class="q-company-tag">${t}</span>`).join('')}
          </div>
          <button class="btn btn-outline" style="padding:5px 14px;font-size:0.78rem">View process →</button>
        </div>
      </div>
    </div>`;

  const renderRounds = (rounds) => {
    if (!rounds?.length) return '<p style="color:var(--muted);font-size:0.875rem">No rounds info available.</p>';
    return `<div class="round-list">
      ${rounds.map((r,i) => `
        <div class="round-item">
          <div class="round-num">${i+1}</div>
          <div class="round-content">
            <h4>${r.round || `Round ${i+1}`}</h4>
            <p>${r.description || ''}</p>
          </div>
        </div>`).join('')}
    </div>`;
  };

  async function loadCompanies() {
    try {
      allCompanies = await API.call('/companies');
      renderGrid(allCompanies);
    } catch(e) {
      document.getElementById('companies-grid').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
    }
  }

  function renderGrid(list) {
    const grid = document.getElementById('companies-grid');
    document.getElementById('count-label').textContent = `${list.length} companies`;
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏢</div><p>No companies found</p></div>';
      return;
    }
    grid.innerHTML = list.map(renderCard).join('');
  }

  function filterCards() {
    const q    = document.getElementById('search-inp').value.toLowerCase();
    const type = document.getElementById('type-filter').value;
    const test = document.getElementById('test-filter').value;
    const filtered = allCompanies.filter(c => {
      const nameMatch = c.name.toLowerCase().includes(q);
      const typeMatch = !type || c.type === type;
      const testMatch = !test || c.testType === test;
      return nameMatch && typeMatch && testMatch;
    });
    renderGrid(filtered);
  }

  function openModal(id) {
    const c = allCompanies.find(x => x._id === id);
    if (!c) return;

    document.getElementById('modal-header-content').innerHTML = `
      ${logoHtml(c)}
      <div>
        <h2 style="font-size:1.25rem">${c.name}</h2>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          ${badgeType(c.type)}
          ${c.package ? `<span class="badge" style="background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2)">${c.package}</span>` : ''}
          ${c.year ? `<span style="font-size:0.78rem;color:var(--faint)">${c.year}</span>` : ''}
        </div>
      </div>`;

    document.getElementById('modal-body-content').innerHTML = `
      <div class="info-grid">
        <div class="info-box"><div class="info-label">Test type</div><div class="info-value">${c.testType||'—'}</div></div>
        <div class="info-box"><div class="info-label">Package</div><div class="info-value">${c.package||'—'}</div></div>
        <div class="info-box"><div class="info-label">Eligibility</div><div class="info-value">${c.eligibility||'—'}</div></div>
        <div class="info-box"><div class="info-label">Visit year</div><div class="info-value">${c.year||'—'}</div></div>
      </div>

      ${c.testDetails ? `
        <div class="section-label">Test details</div>
        <p style="font-size:0.875rem;color:var(--muted);line-height:1.7">${c.testDetails}</p>
      ` : ''}

      <div class="section-label" style="margin-top:1.5rem">Hiring process</div>
      ${renderRounds(c.process)}

      ${(c.dsaTopics?.length) ? `
        <div class="section-label" style="margin-top:1.25rem">DSA topics to focus</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${c.dsaTopics.map(t=>`<span class="q-company-tag">${t}</span>`).join('')}
        </div>
      ` : ''}

      ${c.tips ? `
        <div class="tips-box">
          <div class="tips-label">💡 Tips from seniors</div>
          <p>${c.tips}</p>
        </div>
      ` : ''}
    `;

    document.getElementById('company-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('company-modal').classList.remove('open'); }

  document.getElementById('company-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  loadCompanies();
  let shownNotifs = JSON.parse(sessionStorage.getItem('shown_notifs') || '[]');

async function loadNotifications() {
  try {
    const list = await API.call('/admin/active-notifications');
    list.forEach(n => {
      const key = 'ntf_last_' + n._id;
      const lastShown = localStorage.getItem(key);
      const now = Date.now();
      const shouldShow = !lastShown || (n.repeat > 0 && now - parseInt(lastShown) > n.repeat * 60000);
      if (shouldShow && !shownNotifs.includes(n._id)) {
        setTimeout(() => showNtf(n), 1500);
      }
    });
  } catch(e) {}
}

function showNtf(n) {
  const [bg, fg] = (n.color || '#7c6af7,#fff').split(',');
  document.getElementById('ntf-text').textContent = n.message;
  document.getElementById('ntf-dot').style.background = fg;
  document.getElementById('ntf-modal').style.background = bg;
  document.getElementById('ntf-modal').style.color = fg;
  document.getElementById('ntf-overlay').style.display = 'flex';
  shownNotifs.push(n._id);
  sessionStorage.setItem('shown_notifs', JSON.stringify(shownNotifs));
  localStorage.setItem('ntf_last_' + n._id, Date.now().toString());
  API.call('/admin/notification/' + n._id + '/view', { method: 'POST' }).catch(()=>{});
  if (n.duration > 0) setTimeout(closeNtf, n.duration);
}

function closeNtf() {
  document.getElementById('ntf-overlay').style.display = 'none';
}

loadNotifications();
</script>
  <div id="ntf-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;align-items:center;justify-content:center;padding:1rem">
  <div id="ntf-modal" style="max-width:420px;width:100%;border-radius:16px;padding:1.75rem;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
    <button onclick="closeNtf()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:inherit;cursor:pointer;font-size:1.4rem;opacity:0.6">×</button>
    <div id="ntf-dot" style="width:8px;height:8px;border-radius:50%;display:inline-block;margin-bottom:0.75rem;animation:pulse 1.5s infinite"></div>
    <div id="ntf-text" style="font-size:1rem;font-weight:600;line-height:1.6"></div>
  </div>
</div>

</body>
