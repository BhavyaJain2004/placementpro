<link rel="stylesheet" href="css/style.css">
<style>
.vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-top:1.5rem}
.vid-card{background:#0e0e1e;border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;transition:border-color .15s}
.vid-card:hover{border-color:rgba(124,106,247,0.3)}
.vid-frame{width:100%;aspect-ratio:16/9;border:none}
.vid-info{padding:0.85rem 1rem}
.vid-title{font-size:0.88rem;font-weight:700;color:#fff;margin-bottom:0.3rem}
.vid-meta{font-size:0.72rem;color:rgba(255,255,255,0.35)}
.vid-tag{display:inline-block;font-size:0.62rem;padding:2px 8px;border-radius:99px;margin-top:0.4rem}
.filter-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:1rem}
.f-tab{font-size:0.78rem;padding:5px 14px;border-radius:99px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.45);cursor:pointer}
.f-tab.on{background:rgba(124,106,247,0.12);border-color:rgba(124,106,247,0.35);color:#a89df7}
</style>
</head>

    <a href="masterdsa-dashboard.html" style="font-size:0.82rem;color:rgba(255,255,255,0.45);text-decoration:none;padding:0.35rem 0.75rem;border-radius:8px">🏠 Home</a>
    <a href="masterdsa-roadmap.html" style="font-size:0.82rem;color:rgba(255,255,255,0.45);text-decoration:none;padding:0.35rem 0.75rem;border-radius:8px">🗺️ Roadmap</a>
    <a href="masterdsa-practice.html" style="font-size:0.82rem;color:rgba(255,255,255,0.45);text-decoration:none;padding:0.35rem 0.75rem;border-radius:8px">📚 Practice</a>
    <a href="masterdsa-videos.html" style="font-size:0.82rem;color:#a89df7;text-decoration:none;padding:0.35rem 0.75rem;border-radius:8px;background:rgba(124,106,247,0.1)">🎥 Videos</a>

  <div class="nav-right"><a href="masterdsa-dashboard.html" style="font-size:0.85rem;color:var(--muted);text-decoration:none">← Back</a></div>

<div class="container page-body">
  <h1 style="font-family:'Syne',sans-serif;font-size:1.6rem;color:#fff">🎥 Video Library</h1>

  <div class="vid-grid" id="vid-grid"></div>

<script>

  {id:'75jGy3xAhVs',title:'Arrays in Hindi — One Shot',ch:'CodeHelp - Love Babbar',lang:'Hindi',topic:'Arrays'},

  // ── LINKED LIST ──
  {id:'58YbpRDc4yw',title:'Linked List One Shot — Hindi',ch:'CodeHelp - Love Babbar',lang:'Hindi',topic:'Linked List'},

  // ── TREES ──
  {id:'fAAZixBzIAI',title:'Binary Trees & BST — NeetCode',ch:'NeetCode',lang:'English',topic:'Trees'},
  {id:'_WIfanFr20U',title:'Binary Trees One Shot — Hindi',ch:'CodeHelp - Love Babbar',lang:'Hindi',topic:'Trees'},
  {id:'BHB0B1jFKQc',title:'Tree Traversals — Apna College Hindi',ch:'Apna College',lang:'Hindi',topic:'Trees'},

  // ── BINARY SEARCH ──
  {id:'f2xi3c1S95M',title:'Binary Search Masterclass — Striver',ch:'takeUforward',lang:'English',topic:'Binary Search'},
  {id:'GU7DpgHINWQ',title:'Binary Search in 4 Minutes',ch:'Michael Sambol',lang:'English',topic:'Binary Search'},

  {id:'pkkFqlG0Hds',title:'Sorting Algorithms Explained — Hindi',ch:'Apna College',lang:'Hindi',topic:'Searching & Sorting'},

const topics = ['All','All Topics','Arrays','Linked List','Stacks & Queues','Recursion','Trees','Binary Search','Searching & Sorting','Heaps','Graphs','Greedy','Dynamic Programming','Tries','Bit Manipulation'];
let active = 'All';

document.getElementById('filters').innerHTML = topics.map(t=>
  `<button class="f-tab ${t==='All'?'on':''}" onclick="filterVids('${t}',this)">${t}</button>`).join('');

function filterVids(t, btn){
  active = t;
  document.querySelectorAll('.f-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  const list = active==='All' ? VIDEOS : VIDEOS.filter(v=>v.topic===active);
  document.getElementById('vid-grid').innerHTML = list.map(v=>`
    <div class="vid-card">
      <iframe class="vid-frame" src="https://www.youtube.com/embed/${v.id}" loading="lazy" allowfullscreen></iframe>
      <div class="vid-info">
        <div class="vid-title">${v.title}</div>
        <div class="vid-meta">${v.ch} · ${v.topic}</div>
        <span class="vid-tag" style="background:${v.lang==='Hindi'?'rgba(251,191,36,0.1)':'rgba(52,211,153,0.1)'};color:${v.lang==='Hindi'?'#fbbf24':'#34d399'}">${v.lang}</span>
      </div>
    </div>`).join('');
}
render();
 let shownNotifs = JSON.parse(sessionStorage.getItem('shown_notifs') || '[]');

async function loadNotifications() {
  try {
    const list = await API.call('/admin/active-notifications');
    list.forEach(n => {
      const key = 'ntf_last_' + n._id;
      const lastShown = localStorage.getItem(key);
      const now = Date.now();
      const shouldShow = !lastShown || (n.repeat > 0 && now - parseInt(lastShown) > n.repeat * 60000);
      if (shouldShow && !shownNotifs.includes(n._id)) {
        setTimeout(() => showNtf(n), 1500);
      }
    });
  } catch(e) {}
}

function showNtf(n) {
  const [bg, fg] = (n.color || '#7c6af7,#fff').split(',');
  document.getElementById('ntf-text').textContent = n.message;
  document.getElementById('ntf-dot').style.background = fg;
  document.getElementById('ntf-modal').style.background = bg;
  document.getElementById('ntf-modal').style.color = fg;
  document.getElementById('ntf-overlay').style.display = 'flex';
  shownNotifs.push(n._id);
  sessionStorage.setItem('shown_notifs', JSON.stringify(shownNotifs));
  localStorage.setItem('ntf_last_' + n._id, Date.now().toString());
  API.call('/admin/notification/' + n._id + '/view', { method: 'POST' }).catch(()=>{});
  if (n.duration > 0) setTimeout(closeNtf, n.duration);
}

function closeNtf() {
  document.getElementById('ntf-overlay').style.display = 'none';
}

loadNotifications();
</script>
 <div id="ntf-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;align-items:center;justify-content:center;padding:1rem">
  <div id="ntf-modal" style="max-width:420px;width:100%;border-radius:16px;padding:1.75rem;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
    <button onclick="closeNtf()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:inherit;cursor:pointer;font-size:1.4rem;opacity:0.6">×</button>
    <div id="ntf-dot" style="width:8px;height:8px;border-radius:50%;display:inline-block;margin-bottom:0.75rem;animation:pulse 1.5s infinite"></div>
    <div id="ntf-text" style="font-size:1rem;font-weight:600;line-height:1.6"></div>
  </div>
</div>
</body>
